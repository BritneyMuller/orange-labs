name: Deploy to SiteGround

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to SiteGround
        uses: appleboy/ssh-action@master
        with:
          host: giowm1248.siteground.biz
          username: u2909-t9olhbykrnqj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd ~/orange-labs
            git pull origin main
            cp -r frontend/dist/* ~/www/yourcustomnewsite.com/public_html/
